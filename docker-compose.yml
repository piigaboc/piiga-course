services:
  db:
    image: postgres:16
    container_name: piigacourse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: piiga
      POSTGRES_PASSWORD: piiga
      POSTGRES_DB: piigacourse
    ports:
      - "5432:5432"
    volumes:
      - piigacourse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piiga -d piigacourse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  piigacourse-pgdata:
